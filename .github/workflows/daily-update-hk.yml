name: Daily HK Portfolio Update
on:
    schedule:
      # 08:45 UTC = 16:45 HKT — 35 min after the Closing Auction ends (16:10 HKT)
      # so TradingView Scanner has had time to flush post-CAS settlement prints.
      # 16:30 was too early — caught pre-CAS prices on illiquid HK names.
      - cron: '45 8 * * 1-5'
      # Backup entry (21:00 HKT nominal). Free-tier schedules drift 1.5-6h and
      # can skip entirely; the snapshot write is idempotent per date, so a
      # second run just rewrites the same values. update.py's time-window
      # guard aborts any run that drifts past midnight HKT.
      - cron: '0 13 * * 1-5'
    workflow_dispatch:
jobs:
    update:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-python@v5
          with:
            python-version: '3.12'
        - name: Install dependencies
          run: pip install firebase-admin
        - name: Fetch prices and update Firestore
          env:
            FIREBASE_CREDENTIALS_JSON: ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
          run: python update.py
        - name: Verify snapshot vs TradingView (fails the run on drift)
          env:
            FIREBASE_CREDENTIALS_JSON: ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
          run: python verify-daily.py hk
