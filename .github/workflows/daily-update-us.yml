name: Daily US Portfolio Update
on:
  schedule:
    # 21:10 UTC = 16:10 ET — 10 min after NYSE close so the closing cross has
    # settled and TradingView Scanner has flushed post-cross prints. 21:00 was
    # too tight (cron caught the same pre-settlement print that bit HK at 16:30).
    - cron: '10 21 * * 1-5'
    # Backup entry: 01:00 UTC Tue-Sat = Mon-Fri evening ET (~20:00-21:00 ET).
    # Free-tier schedules drift and can skip entirely; the snapshot write is
    # idempotent per date. update-us.py's time-window guard aborts any run
    # that drifts past midnight ET.
    - cron: '0 1 * * 2-6'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install firebase-admin
      - name: Fetch US prices and update Firestore
        env:
          FIREBASE_CREDENTIALS_JSON: ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
        run: python update-us.py
      - name: Verify snapshot vs TradingView (fails the run on drift)
        env:
          FIREBASE_CREDENTIALS_JSON: ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
        run: python verify-daily.py us
